<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>brain login</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #111;
        --line: #2a2a28;
        --text: #f6f6f2;
        --muted: #a5a5a0;
        --accent: #ff3535;
        --danger: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font: 16px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(420px, calc(100vw - 28px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 24px;
      }
      h1 { margin: 0 0 22px; font-size: 28px; letter-spacing: 0; }
      label { display: block; margin: 14px 0 6px; color: var(--muted); font-size: 13px; font-weight: 750; }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #050505;
        color: var(--text);
        padding: 12px;
        font: inherit;
      }
      button {
        width: 100%;
        margin-top: 18px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        padding: 12px;
        font: inherit;
        font-weight: 850;
        cursor: pointer;
      }
      #error { min-height: 24px; margin-top: 14px; color: var(--danger); }
    </style>
  </head>
  <body>
    <main>
      <h1>brain</h1>
      <form id="login">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button>Log in</button>
        <div id="error" aria-live="polite"></div>
      </form>
    </main>
    <script>
      const form = document.querySelector("#login");
      const error = document.querySelector("#error");
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(Object.fromEntries(new FormData(form))),
        });
        if (res.ok) location.href = "/";
        else error.textContent = (await res.json()).error;
      });
    </script>
  </body>
</html>
